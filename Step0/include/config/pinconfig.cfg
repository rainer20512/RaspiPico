/*
 * pinconfig.cfg
 *
 * Board-specific pin assignments for GPIO and all other
 * I/O pins
 *
 * ----------------------------------------------------------------------------
 * NOTE: this file must not be #include'd but the settings have to be copied 
 * into the preprocessor's macro definition section
 * ----------------------------------------------------------------------------
 *
 * RHB 6.12.25
 *
 */

/* UART 0 */
PICO_DEFAULT_UART=0
PICO_DEFAULT_UART_TX_PIN=0
PICO_DEFAULT_UART_RX_PIN=1

/* SPI1 */
PICO_DEFAULT_SPI=1
PICO_DEFAULT_SPI_CSN_PIN =9
PICO_DEFAULT_SPI_SCK_PIN=10
PICO_DEFAULT_SPI_TX_PIN =11

/* onboard LED(s) */
PICO_DEFAULT_LED_PIN=25

